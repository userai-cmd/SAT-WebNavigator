<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAT WebNavigator — тест віджета</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f2f5;
        color: #1a1a1a;
      }
      header {
        background: #e85d04;
        color: #fff;
        padding: 24px 32px;
      }
      header h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      header p {
        margin: 0;
        opacity: 0.9;
      }
      main {
        max-width: 720px;
        margin: 40px auto;
        padding: 0 24px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .card h2 {
        margin-top: 0;
        font-size: 18px;
      }
      .card ul {
        padding-left: 20px;
      }
      .card li {
        margin-bottom: 8px;
      }
      code {
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>SAT WebNavigator</h1>
      <p>Тестова сторінка віджета чат-бота</p>
    </header>
    <main>
      <div class="card">
        <h2>Як тестувати</h2>
        <ul>
          <li>Натисніть оранжеву кнопку чату внизу справа</li>
          <li>Спробуйте: «Привіт», «Скільки коштує доставка?», «Відстежити накладну»</li>
          <li>Введіть номер накладної (10+ цифр) для тесту трекінгу</li>
        </ul>
        <p>
          API: <code id="api-url">—</code> ·
          <a href="/health" target="_blank">/health</a>
        </p>
      </div>
    </main>

    <script>
      window.SAT_WIDGET_API = window.location.origin;
      document.getElementById("api-url").textContent = window.location.origin;
    </script>
    <script src="/widget/widget.js" data-api=""></script>
  </body>
</html>
